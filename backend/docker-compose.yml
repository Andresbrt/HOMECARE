version: '3.8'

services:
  # PostgreSQL con PostGIS
  postgres:
    image: postgis/postgis:16-3.4
    container_name: homecare-postgres
    environment:
      POSTGRES_DB: homecare_db
      POSTGRES_USER: homecare_user
      POSTGRES_PASSWORD: secure_password_change_me
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - homecare-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homecare_user -d homecare_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis para cache, rate limiting y JWT blacklist
  redis:
    image: redis:7-alpine
    container_name: homecare-redis
    command: redis-server --requirepass secure_redis_password_change_me --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - homecare-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Spring Boot API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: homecare-api
    environment:
      # Database
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: homecare_db
      DATABASE_USERNAME: homecare_user
      DATABASE_PASSWORD: secure_password_change_me
      
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: secure_redis_password_change_me
      
      # JWT
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key_at_least_64_characters_long_change_this}
      JWT_EXPIRATION: 86400000
      JWT_REFRESH_EXPIRATION: 604800000
      
      # CORS
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:19006,https://app.homecare.com
      
      # Wompi
      WOMPI_PUBLIC_KEY: ${WOMPI_PUBLIC_KEY}
      WOMPI_PRIVATE_KEY: ${WOMPI_PRIVATE_KEY}
      WOMPI_EVENT_SECRET: ${WOMPI_EVENT_SECRET}
      PAYMENT_CALLBACK_URL: ${PAYMENT_CALLBACK_URL}
      PAYMENT_WEBHOOK_URL: ${PAYMENT_WEBHOOK_URL}
      
      # Google Maps
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      
      # Firebase
      FIREBASE_SERVER_KEY: ${FIREBASE_SERVER_KEY}
      # FIREBASE_CREDENTIALS_JSON: pega el JSON completo del service account (preferido en Railway/Cloud)
      FIREBASE_CREDENTIALS_JSON: ${FIREBASE_CREDENTIALS_JSON:-}
      # FIREBASE_CREDENTIALS_PATH: ruta al archivo montado (preferido en local con Docker)
      FIREBASE_CREDENTIALS_PATH: /app/config/firebase-credentials.json
      
      # AWS S3
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      
      # SMTP
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      
      # Other
      SPRING_PROFILES_ACTIVE: production
      SERVER_PORT: 8080
      
    ports:
      - "8080:8080"
    volumes:
      - ./src/main/resources/firebase-credentials.json:/app/config/firebase-credentials.json:ro
      - api_logs:/app/logs
    networks:
      - homecare-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # Prometheus (optional - para monitoring)
  prometheus:
    image: prom/prometheus:latest
    container_name: homecare-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - homecare-network
    restart: unless-stopped
    profiles:
      - monitoring

  # Grafana (optional - para dashboards)
  grafana:
    image: grafana/grafana:latest
    container_name: homecare-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin_change_me
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    networks:
      - homecare-network
    depends_on:
      - prometheus
    restart: unless-stopped
    profiles:
      - monitoring

networks:
  homecare-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  api_logs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
