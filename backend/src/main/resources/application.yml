spring:
  application:
    name: homecare-api
  config:
    import: optional:file:.env[.properties]
  
  datasource:
    # SPRING_DATASOURCE_URL overrides everything (usar la External URL de Render en producción).
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/homecare_db}
    username: ${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME:homecare_user}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:}}
    driver-class-name: org.postgresql.Driver
    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@homecare.local}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  servlet:
    multipart:
      enabled: true
      max-file-size: ${FILE_MAX_SIZE:10MB}
      max-request-size: ${FILE_MAX_REQUEST_SIZE:10MB}

  data:
    redis:
      # Railway injects REDISHOST/REDISPORT/REDISPASSWORD
      host: ${REDISHOST:${REDIS_HOST:localhost}}
      port: ${REDISPORT:${REDIS_PORT:6379}}
      password: ${REDISPASSWORD:${REDIS_PASSWORD:}}
      timeout: ${REDIS_TIMEOUT:2s}

server:
  port: ${PORT:${SERVER_PORT:8080}}
  error:
    include-message: always
    include-binding-errors: always

# JWT
jwt:
  secret: ${JWT_SECRET:homecare-default-secret-change-in-production-min-64-chars-long-value}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

# Mercado Pago
mercadopago:
  access-token: ${MP_ACCESS_TOKEN:TEST-XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX}
  public-key: ${MP_PUBLIC_KEY:TEST-XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX}
  webhook-secret: ${MP_WEBHOOK_SECRET:}
  commission-rate: ${MP_COMMISSION_RATE:0.10}
  callback-url: ${MP_CALLBACK_URL:http://localhost:8080/api/v1/payments/webhook}

# Google Maps
google:
  maps:
    api-key: ${GOOGLE_MAPS_API_KEY:maps_placeholder}
    
# Firebase
firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:classpath:firebase-credentials.json}
  server-key: ${FIREBASE_SERVER_KEY:}

# AWS
aws:
  access-key: ${AWS_ACCESS_KEY:}
  secret-key: ${AWS_SECRET_KEY:}
  s3:
    bucket: ${AWS_S3_BUCKET:homecare-files}
    region: ${AWS_S3_REGION:us-east-1}

# Tracking Configuration
tracking:
  update-interval-seconds: ${TRACKING_UPDATE_INTERVAL:30}
  distance-threshold-meters: ${TRACKING_DISTANCE_THRESHOLD:50}
  eta-calculation: ${TRACKING_ETA_CALCULATION:google}

# File Configuration
file:
  max-size: ${FILE_MAX_SIZE:10485760}
  allowed-types: ${FILE_ALLOWED_TYPES:image/jpeg,image/png,image/jpg,application/pdf}
  storage-type: ${FILE_STORAGE_TYPE:s3} # s3, local

# Payment
payment:
  commission-rate: ${PAYMENT_COMMISSION_RATE:0.10}
  callback-url: ${PAYMENT_CALLBACK_URL:http://localhost:8080/api/payments/callback}

# API Documentation
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# Logging
logging:
  level:
    com.homecare: ${LOG_LEVEL:INFO}
    org.springframework.security: ${SECURITY_LOG_LEVEL:WARN}
    AUDIT: INFO

# Security hardening
security:
  # Set to true when the app runs behind a trusted reverse proxy (nginx, AWS ALB, etc.)
  # that sets X-Forwarded-For. Set to false for direct internet-facing deployment.
  trusted-proxy: ${SECURITY_TRUSTED_PROXY:true}

  # Comma-separated list of IPs to block at startup (e.g. known malicious IPs).
  # IPs can also be blocked at runtime via the IpBlockingFilter.blockIp() API.
  blocked-ips: ${BLOCKED_IPS:}

  rate-limit:
    # Max login/registration attempts per minute per IP (brute-force protection)
    auth-requests-per-minute: ${RATE_LIMIT_AUTH:5}
    # Max general API requests per minute per IP
    general-requests-per-minute: ${RATE_LIMIT_GENERAL:100}
# Environment Configuration
app:
  environment: ${APP_ENVIRONMENT:development}
  cache:
    redis-enabled: ${REDIS_ENABLED:false}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
  security:
    rate-limit:
      enabled: ${RATE_LIMIT_ENABLED:true}
      requests-per-minute: ${RATE_LIMIT_RPM:100}

# Async thread pool
async:
  core-pool-size: ${ASYNC_CORE_POOL:4}
  max-pool-size: ${ASYNC_MAX_POOL:8}
  queue-capacity: ${ASYNC_QUEUE_CAPACITY:100}

