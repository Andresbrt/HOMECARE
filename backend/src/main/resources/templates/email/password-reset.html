<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recupera tu contraseña</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 20px auto; padding: 20px; border: 1px solid #ddd; border-radius: 10px; }
        .button { display: inline-block; padding: 10px 20px; background-color: #f5576c; color: white !important; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>¿Olvidaste tu contraseña?</h1>
        <p>Hola <span th:text="${userName}">Usuario</span>,</p>
        <p>Hemos recibido una solicitud para restablecer tu contraseña. Haz clic en el siguiente botón para continuar:</p>
        <p><a th:href="${resetLink}" class="button">Restablecer Contraseña</a></p>
        <p>Este enlace expirará en <span th:text="${expiryHours}">1</span> hora.</p>
        <p>Si no solicitaste esto, ignora este email.</p>
    </div>
</body>
</html>
