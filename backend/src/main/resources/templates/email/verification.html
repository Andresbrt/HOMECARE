<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Verifica tu email</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 20px auto; padding: 20px; border: 1px solid #ddd; border-radius: 10px; }
        .button { display: inline-block; padding: 10px 20px; background-color: #667eea; color: white !important; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>¡Bienvenido a HOME CARE!</h1>
        <p>Hola <span th:text="${userName}">Usuario</span>,</p>
        <p>Gracias por registrarte. Para completar tu registro, por favor verifica tu email haciendo clic en el siguiente botón:</p>
        <p><a th:href="${verificationLink}" class="button">Verificar Email</a></p>
        <p>Este enlace expirará en <span th:text="${expiryHours}">24</span> horas.</p>
        <p>Si no creaste una cuenta, puedes ignorar este email.</p>
    </div>
</body>
</html>
