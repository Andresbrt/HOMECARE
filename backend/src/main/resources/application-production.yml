# ===========================================
# HOMECARE API - PRODUCTION CONFIGURATION
# ===========================================

spring:
  application:
    name: homecare-api

  # Base de datos PostgreSQL
  datasource:
    url: jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:homecare_db}?ssl=true&sslmode=require
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    
    # HikariCP - Optimizado para producción
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      pool-name: HomeCareHikariPool
      connection-test-query: SELECT 1
      validation-timeout: 5000
      register-mbeans: true
      auto-commit: true

  # JPA / Hibernate
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate  # ✅ PRODUCCIÓN: Solo validar, NO modificar schema
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        format_sql: false
        show_sql: false
        use_sql_comments: false
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true
        query:
          in_clause_parameter_padding: true
          warn_on_collection_fetch: true
        generate_statistics: false
        cache:
          use_second_level_cache: true
          use_query_cache: true
          region:
            factory_class: org.hibernate.cache.jcache.JCacheRegionFactory

  # Redis para cache y rate limiting
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 2000ms

  # Flyway migrations
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false
    table: flyway_schema_history

  # Mail configuration (SMTP)
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # Servlet configuration
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

# Server configuration
server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css
    min-response-size: 1024
  http2:
    enabled: true
  error:
    include-message: never
    include-stacktrace: never
    include-exception: false
    include-binding-errors: never

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}  # 24 horas
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}  # 7 días

# CORS Configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://app.homecare.com,https://admin.homecare.com}
  allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
  allowed-headers: Authorization,Content-Type,X-Requested-With,Accept
  exposed-headers: Authorization
  allow-credentials: true
  max-age: 3600

# Wompi (Payment Gateway)
wompi:
  api-url: https://production.wompi.co/v1
  public-key: ${WOMPI_PUBLIC_KEY}
  private-key: ${WOMPI_PRIVATE_KEY}
  event-secret: ${WOMPI_EVENT_SECRET}
  callback-url: ${PAYMENT_CALLBACK_URL}
  webhook-url: ${PAYMENT_WEBHOOK_URL}
  commission-percentage: ${COMMISSION_PERCENTAGE:10.0}

# Google Maps API
google:
  maps:
    api-key: ${GOOGLE_MAPS_API_KEY}
    timeout: 5000
    max-retries: 3

# Firebase Cloud Messaging
firebase:
  server-key: ${FIREBASE_SERVER_KEY}
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:classpath:firebase-credentials.json}

# AWS S3
aws:
  access-key: ${AWS_ACCESS_KEY}
  secret-key: ${AWS_SECRET_KEY}
  region: ${AWS_REGION:us-east-1}
  s3:
    bucket: ${AWS_S3_BUCKET}
    base-url: https://${AWS_S3_BUCKET}.s3.${AWS_REGION}.amazonaws.com

# Tracking Configuration
tracking:
  update-interval-seconds: ${TRACKING_UPDATE_INTERVAL:30}
  distance-threshold-meters: ${TRACKING_DISTANCE_THRESHOLD:50}
  location-history-days: ${TRACKING_HISTORY_DAYS:30}

# Rate Limiting
rate-limit:
  enabled: true
  login-attempts: 5      # 5 intentos por 15 minutos
  registration-attempts: 3  # 3 registros por hora
  api-requests: 100      # 100 requests por minuto por IP

# Actuator + Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
      base-path: /actuator
  
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
    tags:
      application: ${spring.application.name}

# Async thread pool (producción: más threads)
async:
  core-pool-size: ${ASYNC_CORE_POOL:8}
  max-pool-size: ${ASYNC_MAX_POOL:16}
  queue-capacity: ${ASYNC_QUEUE_CAPACITY:200}
      environment: production
  
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    db:
      enabled: true
    redis:
      enabled: true
    diskspace:
      enabled: true
      threshold: 10GB

# Application info
info:
  app:
    name: HomeCare API
    version: 1.0.0
    description: API para plataforma de servicios del hogar
    contact:
      email: support@homecare.com

# Logging
logging:
  level:
    root: WARN
    com.homecare: INFO
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/homecare-api.log
    max-size: 10MB
    max-history: 30
    total-size-cap: 1GB

# Async configuration
async:
  core-pool-size: ${ASYNC_CORE_POOL:5}
  max-pool-size: ${ASYNC_MAX_POOL:20}
  queue-capacity: ${ASYNC_QUEUE_CAPACITY:500}
  notification-pool-size: ${NOTIFICATION_POOL:10}

# Cache configuration
cache:
  caffeine:
    spec: maximumSize=10000,expireAfterWrite=5m
  names: ubicacionesProveedor,solicitudesCercanas,usuarioPerfil

app:
  environment: production
  frontend-url: ${FRONTEND_URL:https://app.homecare.com}
  admin-url: ${ADMIN_URL:https://admin.homecare.com}
