# Perfil LOCAL de desarrollo — H2 en memoria, sin PostgreSQL
spring:
  datasource:
    url: jdbc:h2:mem:homecare_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  flyway:
    enabled: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: noreply@homecare.local
    password: ""
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    com.homecare: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
