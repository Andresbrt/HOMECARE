# Perfil LOCAL de desarrollo — PostgreSQL en Render (external)
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://dpg-d76tpmogjchc73dkl4v0-a.ohio-postgres.render.com:5432/homecare_db_xym7}
    username: ${SPRING_DATASOURCE_USERNAME:homecare_user}
    password: ${SPRING_DATASOURCE_PASSWORD:9peh0USodVBNOsNCVsIGjs374rAqJ511}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

  mail:
    host: ${MAIL_HOST:smtp-relay.brevo.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.ssl.trust: "*"
      mail.smtp.ssl.protocols: TLSv1.2

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 500ms
      connect-timeout: 500ms

  cache:
    type: simple  # usa ConcurrentMap en vez de Redis en dev

# Desactivar Redis y Mail del health check en dev
management:
  health:
    redis:
      enabled: false
    mail:
      enabled: true
  endpoint:
    health:
      show-details: always

app:
  cache:
    redis-enabled: false

logging:
  level:
    com.homecare: DEBUG
    org.springframework.security: DEBUG

