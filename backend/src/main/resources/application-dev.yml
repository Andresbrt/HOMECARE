# Perfil LOCAL de desarrollo
# Por defecto usa H2 en memoria (sin necesidad de BD externa).
# Para conectar a Supabase localmente, descomentar las variables en .env
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:homecare;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;NON_KEYWORDS=VALUE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    # database-platform: auto-detectado desde la URL
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

  mail:
    host: ${MAIL_HOST:smtp-relay.brevo.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.ssl.trust: "*"
      mail.smtp.ssl.protocols: TLSv1.2

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 500ms
      connect-timeout: 500ms

  cache:
    type: simple  # usa ConcurrentMap en vez de Redis en dev

# Desactivar Redis y Mail del health check en dev
management:
  health:
    redis:
      enabled: false
    mail:
      enabled: true
  endpoint:
    health:
      show-details: always

app:
  cache:
    redis-enabled: false

logging:
  level:
    com.homecare: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

